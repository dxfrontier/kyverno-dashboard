apiVersion: v1
kind: Service
metadata:
  name: kyverno-dashboard
  namespace: kyverno-dashboard
  labels:
    app.kubernetes.io/name: kyverno-dashboard
    app.kubernetes.io/component: service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kyverno-dashboard
    app.kubernetes.io/component: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: kyverno-dashboard-backend
  namespace: kyverno-dashboard
  labels:
    app.kubernetes.io/name: kyverno-dashboard
    app.kubernetes.io/component: backend-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kyverno-dashboard
    app.kubernetes.io/component: backend
