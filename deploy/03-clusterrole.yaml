apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-dashboard-reader
  labels:
    app.kubernetes.io/name: kyverno-dashboard
    app.kubernetes.io/component: clusterrole
rules:
  # Kyverno CEL policies (policies.kyverno.io) — available in Kyverno >= 1.13.
  # Commented out in store.go for older clusters; RBAC is kept future-proof.
  - apiGroups:
      - policies.kyverno.io
    resources:
      - validatingpolicies
      - generatingpolicies
      - mutatingpolicies
    verbs:
      - get
      - list
      - watch
  # Kyverno cluster policies (kyverno.io)
  - apiGroups:
      - kyverno.io
    resources:
      - clusterpolicies
    verbs:
      - get
      - list
      - watch
  # Policy Reports (wgpolicyk8s.io)
  - apiGroups:
      - wgpolicyk8s.io
    resources:
      - policyreports
      - clusterpolicyreports
    verbs:
      - get
      - list
      - watch
